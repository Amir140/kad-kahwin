<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kad Kahwin Digital | Amir & Lidya</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #8ea8b3; color: #28343b; }
    .cover { position: fixed; inset: 0; display: grid; place-items: center; background: #8ea8b3; transition: .5s; z-index: 10; }
    .cover.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .card { background: #f8f8f8; border: 1px solid #d6dbe0; border-radius: 8px; padding: 24px; text-align: center; box-shadow: 0 10px 24px rgba(0,0,0,.12); }
    .name { font-size: 42px; font-family: cursive; margin: 0 0 14px; }
    .btn { border: 0; border-radius: 999px; padding: 10px 20px; background: #4f6c79; color: #fff; cursor: pointer; }
    main { max-width: 700px; margin: 0 auto; padding: 16px 12px 90px; }
    .section { background: #f8f8f8; border: 1px solid #d6dbe0; border-radius: 8px; padding: 16px; margin: 12px 0; }
    .nav { position: fixed; left: 50%; bottom: 10px; transform: translateX(-50%); display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; background: #fff; border: 1px solid #d6dbe0; border-radius: 999px; padding: 6px; max-width: 540px; width: calc(100% - 16px); }
    .nav a, .nav button { border: 0; background: transparent; padding: 8px 6px; border-radius: 999px; text-decoration: none; color: #3f5561; cursor: pointer; }
  </style>
</head>
<body>
  <div class="cover" id="cover">
    <div class="card">
      <h1 class="name">Amir &amp; Lidya</h1>
      <button class="btn" id="openInvite" type="button">Tap</button>
    </div>
  </div>

  <main>
    <section class="section" id="hero">
      <h2>Walimatul Urus</h2>
      <p>Amir &amp; Lidya</p>
      <p>29 Ogos 2026</p>
    </section>
    <section class="section" id="details">
      <h2>Butiran</h2>
      <p>11:00 AM - 4:00 PM</p>
      <p>Dewan Serbaguna Bedong, Kedah</p>
    </section>
    <section class="section" id="contact">
      <h2>Contact</h2>
      <p><a href="https://wa.me/601XXXXXXXX">WhatsApp</a></p>
    </section>
  </main>

  <nav class="nav">
    <a href="#contact">Contact</a>
    <button type="button">Music</button>
    <a href="#details">Location</a>
    <button type="button">Calendar</button>
  </nav>

  <script>
    const cover = document.getElementById("cover");
    const openInvite = document.getElementById("openInvite");
    document.body.style.overflow = "hidden";
    openInvite.addEventListener("click", () => {
      cover.classList.add("hidden");
      document.body.style.overflow = "auto";
    });
  </script>
</body>
</html>
